services:
  firmware-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: firmware-analyzer
    volumes:
      # Persistent storage for analysis data
      - ./firmware_samples:/firmware-analysis/firmware_samples:rw
      - ./binwalk-analysis:/firmware-analysis/binwalk-analysis:rw
      - ./dependency-inventory:/firmware-analysis/dependency-inventory:rw
      - ./dynamic-analysis:/firmware-analysis/dynamic-analysis:rw
      - ./hexdump-analysis:/firmware-analysis/hexdump-analysis:rw
      - ./sample-coverage:/firmware-analysis/sample-coverage:rw
      - ./reverse-engineering-hints:/firmware-analysis/reverse-engineering-hints:rw
      - ./supply-chain-verification:/firmware-analysis/supply-chain-verification:rw
      - ./yara-rules:/firmware-analysis/yara-rules:rw
      - ./screenshots:/firmware-analysis/screenshots:rw
      - ./reports:/firmware-analysis/reports:rw
      - ./logs:/firmware-analysis/logs:rw
    # We do NOT mount the webapp folder anymore during production to avoid overwriting node_modules
    # If you are developing the UI, uncomment the line below:
    # - ./webapp:/firmware-analysis/webapp:rw
    init: true
    environment:
      - TZ=Asia/Taipei
      - ANALYSIS_INTERVAL=30 # Minutes
      - NODE_ENV=production
      - MAX_UPLOAD_BYTES=2147483648
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:3000"]
      interval: 1m
      timeout: 10s
      retries: 3
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
